<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Calculadora de Gramagem e Peso Linear</title>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<style>
/* ---------------------- */
/*   ESTILO PROFISSIONAL  */
/* ---------------------- */

body {
    margin: 0;
    padding: 0;
    font-family: "Segoe UI", Arial, sans-serif;

    /* 🔵 Imagem de fundo profissional */
    background-image: url("https://www.dropbox.com/scl/fi/v8hmjb4yod0tt71ucm9px/tinkave-logo.png?rlkey=2fw9bk40kchsjkdjfk5g6spur&e=1&dl=1");
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center 40px;
    background-attachment: fixed;

    /* Overlay escuro */
    position: relative;
}

body::before {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(3px);
    z-index: 0;
}

/* Container central com efeito glass */
.container {
    position: relative;
    z-index: 1;
    max-width: 550px;
    margin: 120px auto 60px auto;
    padding: 30px;

    background: rgba(255,255,255,0.12);
    border-radius: 14px;
    backdrop-filter: blur(14px);
    box-shadow: 0 0 25px rgba(0,0,0,0.45);

    color: white;
}

/* Títulos */
h1, h2 {
    text-align: center;
    margin-top: 0;
    font-weight: 300;
}

/* Labels e inputs */
label {
    display: block;
    margin-top: 15px;
    font-weight: 500;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 6px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.85);
    font-size: 15px;
}

/* Botões */
button {
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: #0078D7;
    color: white;
    transition: 0.2s;
}

button:hover {
    background: #005a9e;
}

/* Resultado */
#resultado {
    margin-top: 25px;
    font-size: 1.2em;
    font-weight: 500;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

<h1>Calculadora de Gramagem e Peso Linear</h1>

<label for="tipoCalculo">Tipo de Cálculo:</label>
<select id="tipoCalculo" onchange="mostrarCampos()">
    <option value="algodao">Algodão</option>
    <option value="linho">Linho</option>
    <option value="ambos">Ambos</option>
</select>

<label>Nome do Projeto:
<input type="text" id="nomeProjeto" placeholder="Ex: Tecidos Verão 2025">
</label>

<!-- ALGODÃO -->
<div id="algodaoCampos">
<h2>Algodão (Ne)</h2>

<label>Fios Teia: <input type="number" id="fiosTeiaCO" value="110"></label>
<label>Fios Trama: <input type="number" id="fiosTramaCO" value="90"></label>
<label>Ne Teia: <input type="text" id="neTeiaCO" value="40"></label>
<label>Ne Trama: <input type="text" id="neTramaCO" value="40"></label>
<label>Encolhimento Teia (%): <input type="number" id="encTeiaCO" value="5"></label>
<label>Encolhimento Trama (%): <input type="number" id="encTramaCO" value="3"></label>
<label>Largura da Tela (cm): <input type="number" id="larguraCO" value="315"></label>
</div>

<!-- LINHO -->
<div id="linhoCampos">
<h2>Linho (Nm)</h2>

<label>Fios Teia: <input type="number" id="fiosTeiaLI" value="50"></label>
<label>Fios Trama: <input type="number" id="fiosTramaLI" value="48"></label>
<label>Nm Teia: <input type="text" id="nmTeiaLI" value="26"></label>
<label>Nm Trama: <input type="text" id="nmTramaLI" value="26"></label>
<label>Encolhimento Teia (%): <input type="number" id="encTeiaLI" value="5"></label>
<label>Encolhimento Trama (%): <input type="number" id="encTramaLI" value="5"></label>
<label>Largura da Tela (cm): <input type="number" id="larguraLI" value="330"></label>
</div>

<label>Exportar:
<select id="exportarTipo">
    <option value="ambos">Algodão e Linho</option>
    <option value="algodao">Somente Algodão</option>
    <option value="linho">Somente Linho</option>
</select>
</label>

<button onclick="calcular()">Calcular</button>
<button onclick="exportarPDF()">Exportar para PDF</button>

<div id="resultado"></div>

</div>

<script>
function mostrarCampos() {
    const tipo = document.getElementById("tipoCalculo").value;
    document.getElementById("algodaoCampos").style.display = (tipo === "linho") ? "none" : "block";
    document.getElementById("linhoCampos").style.display = (tipo === "algodao") ? "none" : "block";
}
window.onload = mostrarCampos;

function corrigirTitulo(titulo) {
    if (titulo.includes("/")) {
        const partes = titulo.split("/");
        return parseFloat(partes[0]) / parseFloat(partes[1]);
    }
    return parseFloat(titulo);
}

let resultados = {};

function calcular() {
    /* Algodão */
    const fiosTeiaCOv = parseFloat(fiosTeiaCO.value);
    const fiosTramaCOv = parseFloat(fiosTramaCO.value);
    const neTeiaCOv = corrigirTitulo(neTeiaCO.value);
    const neTramaCOv = corrigirTitulo(neTramaCO.value);
    const encTeiaCOv = parseFloat(encTeiaCO.value) / 100;
    const encTramaCOv = parseFloat(encTramaCO.value) / 100;
    const larguraCOv = parseFloat(larguraCO.value);

    const parteTeiaCO = ((fiosTeiaCOv / 0.0254) * (1 + encTeiaCOv)) / (neTeiaCOv / 0.59);
    const parteTramaCO = ((fiosTramaCOv / 0.0254) * (1 + encTramaCOv)) / (neTramaCOv / 0.59);
    const gramagemCO = parteTeiaCO + parteTramaCO;
    const pesoLinearCO = gramagemCO * (larguraCOv / 100);

    /* Linho */
    const fiosTeiaLIv = parseFloat(fiosTeiaLI.value);
    const fiosTramaLIv = parseFloat(fiosTramaLI.value);
    const nmTeiaLIv = corrigirTitulo(nmTeiaLI.value);
    const nmTramaLIv = corrigirTitulo(nmTramaLI.value);
    const encTeiaLIv = parseFloat(encTeiaLI.value) / 100;
    const encTramaLIv = parseFloat(encTramaLI.value) / 100;
    const larguraLIv = parseFloat(larguraLI.value);

    const parteTeiaLI = ((fiosTeiaLIv / 0.0254) * (1 + encTeiaLIv)) / nmTeiaLIv;
    const parteTramaLI = ((fiosTramaLIv / 0.0254) * (1 + encTramaLIv)) / nmTramaLIv;
    const gramagemLI = parteTeiaLI + parteTramaLI;
    const pesoLinearLI = gramagemLI * (larguraLIv / 100);

    resultados = {
        algodao: {
            gramagem: gramagemCO.toFixed(2),
            pesoLinear: pesoLinearCO.toFixed(2)
        },
        linho: {
            gramagem: gramagemLI.toFixed(2),
            pesoLinear: pesoLinearLI.toFixed(2)
        }
    };

    let texto = "";
    if (tipoCalculo.value !== "linho")
        texto += `Gramagem Algodão: ${resultados.algodao.gramagem} g/m²<br>Peso Linear: ${resultados.algodao.pesoLinear} g/m<br><br>`;
    if (tipoCalculo.value !== "algodao")
        texto += `Gramagem Linho: ${resultados.linho.gramagem} g/m²<br>Peso Linear: ${resultados.linho.pesoLinear} g/m`;

    resultado.innerHTML = texto;
}

function exportarPDF() {
    const tipo = exportarTipo.value;
    const nomeProjeto = nomeProjeto.value.trim() || "Projeto: Cálculo de Gramagem";

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.setFontSize(14);
    doc.text(nomeProjeto, 20, 20);

    let y = 30;

    if (tipo !== "linho") {
        doc.text("Algodão (CO)", 20, y);
        doc.autoTable({
            startY: y + 5,
            head: [["Gramagem (g/m²)", "Peso Linear (g/m)"]],
            body: [[resultados.algodao.gramagem, resultados.algodao.pesoLinear]]
        });
        y = doc.lastAutoTable.finalY + 10;
    }

    if (tipo !== "algodao") {
        doc.text("Linho (LI)", 20, y);
        doc.autoTable({
            startY: y + 5,
            head: [["Gramagem (g/m²)", "Peso Linear (g/m)"]],
            body: [[resultados.linho.gramagem, resultados.linho.pesoLinear]]
        });
    }

    doc.save("calculo_gramagem.pdf");
}
</script>

</body>
</html>
